services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-opsight}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-opsight_secret}
      - POSTGRES_DB=${DB_NAME:-opsight}
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - opsight-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opsight} -d ${DB_NAME:-opsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - opsight-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opsight-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - nginx_logs:/var/log/nginx
      # 生产环境挂载 SSL 证书
      # - ./ssl:/etc/nginx/ssl:ro

  # ============================================
  # 后端 API 服务 (Go/Gin)
  # ============================================
  api:
    build:
      context: ./opsight-backend
      dockerfile: Dockerfile
    expose:
      - "${API_PORT:-8800}"
    environment:
      - PORT=${API_PORT:-8800}
      - GIN_MODE=${GIN_MODE:-release}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-100}
      - RATE_LIMIT_LOGIN_RPM=${RATE_LIMIT_LOGIN_RPM:-5}
      - MAX_BODY_SIZE=${MAX_BODY_SIZE:-1048576}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-opsight}
      - DB_PASSWORD=${DB_PASSWORD:-opsight_secret}
      - DB_NAME=${DB_NAME:-opsight}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - AGENT_API_KEY=${AGENT_API_KEY:-}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opsight-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT:-8800}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app_data:/app/data

  # ============================================
  # 前端服务 (Next.js)
  # ============================================
  frontend:
    build:
      context: ./opsight-frontend
      dockerfile: Dockerfile
    expose:
      - "${FRONTEND_PORT:-3800}"
    environment:
      - API_URL=http://api:${API_PORT:-8800}
      - PORT=${FRONTEND_PORT:-3800}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opsight-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${FRONTEND_PORT:-3800}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# ============================================
# 命名卷（数据持久化）
# ============================================
volumes:
  nginx_logs:
    driver: local
  app_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 内部网络
# ============================================
networks:
  opsight-net:
    driver: bridge
    name: opsight-net
